<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Globe/world representing WFS web service -->
  <circle cx="12" cy="8" r="6" fill="none" stroke="#1976D2" stroke-width="1.5"/>
  <ellipse cx="12" cy="8" rx="6" ry="2.5" fill="none" stroke="#1976D2" stroke-width="1"/>
  <ellipse cx="12" cy="8" rx="2.5" ry="6" fill="none" stroke="#1976D2" stroke-width="1"/>
  <line x1="6" y1="8" x2="18" y2="8" stroke="#1976D2" stroke-width="1"/>

  <!-- Folder/tree structure below -->
  <rect x="3" y="16" width="5" height="4" rx="0.5" fill="#FFC107"/>
  <rect x="10" y="16" width="5" height="4" rx="0.5" fill="#FFC107"/>
  <rect x="17" y="16" width="5" height="4" rx="0.5" fill="#FFC107"/>

  <!-- Connection lines from globe to folders -->
  <line x1="12" y1="14" x2="5.5" y2="16" stroke="#666" stroke-width="1"/>
  <line x1="12" y1="14" x2="12.5" y2="16" stroke="#666" stroke-width="1"/>
  <line x1="12" y1="14" x2="19.5" y2="16" stroke="#666" stroke-width="1"/>
</svg>
